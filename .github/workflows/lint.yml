name: Lint & Security

on: [push, pull_request]

jobs:
  # Ruff: fast lint (imports, bugbear, pyupgrade, pycodestyle). Config and rule
  # selection live in pyproject.toml. Complements the existing pylint workflow.
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff==0.9.7
      - name: ruff check
        run: ruff check hashview/ hashview.py

  # Bandit SAST against the committed baseline — only NEW findings (not already
  # in .bandit-baseline.json) fail the build. Scans the server + agent.
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install "bandit[toml]==1.9.4"
      - name: bandit (vs baseline)
        run: bandit -r hashview install/hashview-agent -c pyproject.toml -b .bandit-baseline.json

  # pip-audit: fail on dependencies with known CVEs (PyPI / OSV advisory DB).
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit==2.10.0
      - name: Audit production dependencies
        run: pip-audit -r requirements.txt

  # OpenAPI: structural validation of the committed API spec. Route<->spec
  # parity is additionally enforced by tests/unit/test_openapi_spec.py (run
  # locally — there is no full-deps unit-test CI job).
  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validator
        run: pip install openapi-spec-validator==0.7.1
      - name: Validate OpenAPI spec
        run: openapi-spec-validator hashview/api_docs/openapi.yaml
