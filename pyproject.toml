[tool.ruff]
target-version = "py38"
# Match .pylintrc's max-line-length so the two linters agree on width.
line-length = 100
# Autogenerated Alembic migrations — .pylintrc ignores these too (ignore-paths).
extend-exclude = ["migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = [
    # Line length is enforced by pylint (max-line-length = 100); don't double-flag.
    "E501",
    # `== True` / `== False`: this is a SQLAlchemy codebase and column
    # comparisons like `Hashes.cracked == True` compile to SQL `= 1`. Rewriting
    # them to truthiness (`if Hashes.cracked:`) would change the generated SQL,
    # so the rule produces false positives here.
    "E712",
    # printf `%`-style formatting (`'%d' % n`): kept intentionally. `%d` coerces
    # its operand to int and several sites build regex `{N}` quantifiers
    # (`r'[0-9a-fA-F]{%d}'`), so a blind f-string rewrite would be
    # behavior-changing. `.format()` usages are still modernized via UP032.
    "UP031",
]

[tool.bandit]
# tests/ feeds intentionally malformed/hostile inputs; control/ is runtime data;
# migrations/ is autogenerated. Scan first-party server + agent code only.
exclude_dirs = ["tests", "venv", ".venv", "migrations", "hashview/control"]
