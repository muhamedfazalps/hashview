<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Hashview brand mark: the phosphor octothorp from the sidebar/login brand.
       Colours match the design tokens: bg #0c0f0d, amber border #c4831f,
       amber glyph #ffb53d over a faint amber fill. -->
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="3.5" y="3.5" width="57" height="57" rx="13" fill="#0c0f0d" stroke="#c4831f" stroke-width="3"/>
  <rect x="3.5" y="3.5" width="57" height="57" rx="13" fill="#ffb53d" fill-opacity="0.07"/>
  <g stroke="#ffb53d" stroke-width="5.5" stroke-linecap="round" filter="url(#glow)">
    <line x1="27" y1="16" x2="24" y2="48"/>
    <line x1="43" y1="16" x2="40" y2="48"/>
    <line x1="15" y1="29" x2="50" y2="27"/>
    <line x1="14" y1="41" x2="49" y2="39"/>
  </g>
</svg>
