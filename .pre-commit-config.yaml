# Pre-commit hooks for Hashview.
#
# One-time setup:   pip install -r requirements-dev.txt && pre-commit install
# Run on demand:    pre-commit run --all-files
#
# These mirror the CI gates in .github/workflows/lint.yml so issues are caught
# locally before they reach a push. Config (rule selection, line length,
# exclusions) lives in pyproject.toml so the hooks and CI stay in sync.
repos:
  # Ruff: lint (auto-fixing what it safely can) + format. Reads [tool.ruff] from
  # pyproject.toml (line-length 100, select E/F/I/B/UP, migrations excluded).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Bandit security scan against the committed baseline (.bandit-baseline.json):
  # only findings NOT already in the baseline fail. Run as a local full-tree
  # scan (pass_filenames: false) so the scope matches the baseline and CI
  # exactly — the stock hook would pass only changed files and break baseline
  # comparison.
  - repo: local
    hooks:
      - id: bandit-baseline
        name: bandit security scan (vs baseline)
        entry: bandit -r hashview install/hashview-agent -c pyproject.toml -b .bandit-baseline.json -q
        language: python
        additional_dependencies: ["bandit[toml]==1.9.4"]
        pass_filenames: false
        files: \.py$

  # OpenAPI spec structural validation — fires only when the committed API
  # spec changes. Parity with the actual /v1 routes is enforced separately by
  # tests/unit/test_openapi_spec.py.
  - repo: https://github.com/python-openapi/openapi-spec-validator
    rev: 0.7.1
    hooks:
      - id: openapi-spec-validator
        files: ^hashview/api_docs/openapi\.yaml$

  # General hygiene.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
